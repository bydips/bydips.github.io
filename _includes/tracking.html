{% if site.tracking.gtag_id %}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.tracking.gtag_id }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag("js", new Date());
  gtag("config", "{{ site.tracking.gtag_id }}");
</script>
{% endif %}
